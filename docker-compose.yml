version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atomicpay-db
    environment:
      POSTGRES_USER: atomic_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: atomicpay
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomic_user -d atomicpay"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: atomicpay-backend
    ports:
      - "3000:3000"
    environment:
      - DB_USER=atomic_user
      - DB_PASSWORD=password123
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=atomicpay
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: atomicpay-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
