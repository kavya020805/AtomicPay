version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: atomicpay-db
    environment:
      POSTGRES_USER: atomic_user
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: atomicpay
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
